<html lang="ja">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ニューストピック ランキング</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede9;
    --text: #1a1a1a; --text2: #555550; --text3: #999993;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --blue-bg: #E6F1FB; --blue-text: #0C447C; --blue-mid: #378ADD; --blue-strong: #185FA5;
    --green-bg: #E1F5EE; --green-text: #085041; --green-mid: #1D9E75;
    --amber-bg: #FAEEDA; --amber-text: #633806;
    --purple-bg: #EEEDFE; --purple-text: #3C3489;
    --teal-bg: #EAF3DE; --teal-text: #27500A;
    --r: 8px; --rl: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252522; --bg3: #2e2e2b;
      --text: #f0efeb; --text2: #a8a8a0; --text3: #666660;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --blue-bg: #0c2a44; --blue-text: #85B7EB;
      --green-bg: #062a1e; --green-text: #5DCAA5;
      --amber-bg: #2e1c04; --amber-text: #FAC775;
      --purple-bg: #1a1640; --purple-text: #AFA9EC;
      --teal-bg: #152808; --teal-text: #97C459;
    }
  }
  body { font-family: var(--font); background: var(--bg3); color: var(--text); min-height: 100vh; }
  .page { max-width: 720px; margin: 0 auto; padding: 2rem 1rem 4rem; }

  header { margin-bottom: 2rem; }
  header h1 { font-size: 22px; font-weight: 600; color: var(--text); }
  header p { font-size: 13px; color: var(--text2); margin-top: 4px; }
  header small { font-size: 11px; color: var(--text3); }

  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .toolbar-label { font-size: 12px; color: var(--text3); }
  .sort-btn {
    font-size: 12px; padding: 5px 14px; border-radius: 20px;
    border: 1px solid var(--border2); background: var(--bg);
    color: var(--text2); cursor: pointer; font-family: var(--font);
    transition: all 0.15s;
  }
  .sort-btn.on { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-mid); }
  .sort-btn:hover:not(.on) { background: var(--bg2); }

  .topic-list { display: flex; flex-direction: column; gap: 8px; }
  .topic-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--rl); cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .topic-row:hover { border-color: var(--border2); }
  .topic-row.sel { border-color: var(--blue-mid); border-width: 1.5px; }

  .rank-num {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
  }
  .rn1 { background: var(--blue-bg); color: var(--blue-text); }
  .rn2 { background: var(--green-bg); color: var(--green-text); }
  .rn3 { background: var(--amber-bg); color: var(--amber-text); }
  .rno { background: var(--bg2); color: var(--text2); }

  .topic-main { flex: 1; min-width: 0; }
  .topic-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; }
  .topic-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .mini-bars { display: flex; flex-direction: column; gap: 4px; width: 72px; flex-shrink: 0; }
  .mini-bar-row { display: flex; gap: 4px; align-items: center; }
  .mini-label { font-size: 9px; color: var(--text3); width: 22px; }
  .mini-track { flex: 1; height: 3px; background: var(--bg2); border-radius: 2px; overflow: hidden; }
  .mini-fill-i { height: 3px; background: var(--blue-mid); border-radius: 2px; }
  .mini-fill-n { height: 3px; background: var(--green-mid); border-radius: 2px; }

  .score-col { display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; }
  .score-big { font-size: 20px; font-weight: 600; color: var(--text); line-height: 1; }
  .score-tiny { font-size: 10px; color: var(--text3); margin-top: 2px; }

  .cat-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; flex-shrink: 0; }
  .tw { background: var(--purple-bg); color: var(--purple-text); }
  .te { background: var(--teal-bg); color: var(--teal-text); }
  .tp { background: var(--blue-bg); color: var(--blue-text); }
  .tt { background: var(--amber-bg); color: var(--amber-text); }

  .chevron { font-size: 16px; color: var(--text3); flex-shrink: 0; transition: transform 0.2s; }
  .topic-row.sel .chevron { transform: rotate(90deg); }

  .detail-box {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--rl); padding: 1.5rem;
    margin-top: 0.5rem; margin-bottom: 0.5rem;
  }
  .d-tag-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .d-source { font-size: 11px; color: var(--text3); }
  .d-title { font-size: 16px; font-weight: 600; color: var(--text); line-height: 1.45; margin-bottom: 14px; }

  .d-scores { display: flex; margin-bottom: 16px; border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
  .ds-cell { flex: 1; padding: 12px; text-align: center; background: var(--bg2); border-right: 1px solid var(--border); }
  .ds-cell:last-child { border-right: none; }
  .ds-val { font-size: 22px; font-weight: 700; }
  .ds-lbl { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .ds-why { font-size: 10px; color: var(--text3); margin-top: 5px; line-height: 1.4; }

  .d-summary { font-size: 13px; color: var(--text2); line-height: 1.8; margin-bottom: 16px; }

  .section-lbl {
    font-size: 10px; font-weight: 600; color: var(--text3);
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 8px; margin-top: 16px;
  }
  .points-list { display: flex; flex-direction: column; gap: 7px; }
  .point-item { display: flex; gap: 8px; font-size: 13px; color: var(--text2); line-height: 1.55; }
  .point-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--blue-mid); flex-shrink: 0; margin-top: 7px; }

  .links-grid { display: flex; flex-direction: column; gap: 8px; }
  .link-card {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px; border: 1px solid var(--border);
    border-radius: var(--r); text-decoration: none;
    background: var(--bg); transition: border-color 0.15s;
  }
  .link-card:hover { border-color: var(--border2); }
  .link-icon {
    width: 30px; height: 30px; border-radius: 6px; flex-shrink: 0;
    background: var(--bg2); display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--text2);
  }
  .link-body { flex: 1; min-width: 0; }
  .link-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .link-desc { font-size: 11px; color: var(--text3); margin-top: 2px; line-height: 1.4; }
  .link-url { font-size: 10px; color: var(--blue-strong); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .related-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .rel-chip {
    font-size: 12px; padding: 5px 12px; border-radius: 14px;
    border: 1px solid var(--border2); background: var(--bg);
    color: var(--text2); cursor: default; font-family: var(--font);
  }

  .update-note {
    margin-top: 3rem; padding: 1rem 1.25rem;
    background: var(--bg2); border-radius: var(--r);
    font-size: 12px; color: var(--text3); line-height: 1.7;
  }
  .update-note strong { color: var(--text2); }
</style>
</head>

let sortMode = 'total';
let selectedId = null;

function setSort(btn, mode) {
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  sortMode = mode;
  selectedId = null;
  render();
}

function getSorted() {
  return [...NEWS].sort((a, b) => {
    if (sortMode === 'importance') return b.importance - a.importance;
    if (sortMode === 'interest')   return b.interest   - a.interest;
    return (b.importance + b.interest) - (a.importance + a.interest);
  });
}

function score(a) {
  if (sortMode === 'importance') return a.importance;
  if (sortMode === 'interest')   return a.interest;
  return Math.round((a.importance + a.interest) / 2);
}

function scoreLbl() {
  if (sortMode === 'importance') return '重要度';
  if (sortMode === 'interest')   return '関心度';
  return '総合';
}

function toggle(id) {
  selectedId = selectedId === id ? null : id;
  render();
}

function render() {
  const sorted = getSorted();
  const list = document.getElementById('topicList');
  let html = '';

  sorted.forEach((a, i) => {
    const cat = catMeta[a.category];
    const rncls = i===0?'rn1':i===1?'rn2':i===2?'rn3':'rno';
    const sel = selectedId === a.id ? 'sel' : '';
    html += `<div class="topic-row ${sel}" onclick="toggle(${a.id})">
      <div class="rank-num ${rncls}">${i+1}</div>
      <div class="topic-main">
        <div class="topic-title">${a.title}</div>
        <div class="topic-sub">${a.source}</div>
      </div>
      <div class="mini-bars">
        <div class="mini-bar-row"><span class="mini-label">重要</span><div class="mini-track"><div class="mini-fill-i" style="width:${a.importance}%"></div></div></div>
        <div class="mini-bar-row"><span class="mini-label">関心</span><div class="mini-track"><div class="mini-fill-n" style="width:${a.interest}%"></div></div></div>
      </div>
      <div class="score-col">
        <div class="score-big">${score(a)}</div>
        <div class="score-tiny">${scoreLbl()}</div>
      </div>
      <span class="cat-tag ${cat.cls}">${cat.label}</span>
      <span class="chevron">›</span>
    </div>`;

    if (selectedId === a.id) {
      const total = Math.round((a.importance + a.interest) / 2);
      html += `<div class="detail-box">
        <div class="d-tag-row">
          <span class="cat-tag ${cat.cls}">${cat.label}</span>
          <span class="d-source">${a.source}</span>
        </div>
        <div class="d-title">${a.title}</div>
        <div class="d-scores">
          <div class="ds-cell">
            <div class="ds-val" style="color:#185FA5">${a.importance}</div>
            <div class="ds-lbl">重要度</div>
            <div class="ds-why">${a.importance_reason}</div>
          </div>
          <div class="ds-cell">
            <div class="ds-val" style="color:#0F6E56">${a.interest}</div>
            <div class="ds-lbl">関心度</div>
            <div class="ds-why">${a.interest_reason}</div>
          </div>
          <div class="ds-cell">
            <div class="ds-val">${total}</div>
            <div class="ds-lbl">総合スコア</div>
          </div>
        </div>
        <div class="d-summary">${a.summary}</div>
        <div class="section-lbl">主なポイント</div>
        <div class="points-list">${a.points.map(p=>`<div class="point-item"><div class="point-dot"></div><span>${p}</span></div>`).join('')}</div>
        <div class="section-lbl">関連記事・参考リンク</div>
        <div class="links-grid">${a.links.map(l=>`
          <a class="link-card" href="${l.url}" target="_blank" rel="noopener">
            <div class="link-icon">${l.media.substring(0,2).toUpperCase()}</div>
            <div class="link-body">
              <div class="link-name">${l.name}</div>
              <div class="link-desc">${l.desc}</div>
              <div class="link-url">${l.url}</div>
            </div>
          </a>`).join('')}
        </div>
        <div class="section-lbl">関連キーワード</div>
        <div class="related-chips">${a.related.map(r=>`<span class="rel-chip">${r}</span>`).join('')}</div>
      </div>`;
    }
  });

  list.innerHTML = html;
}

render();
</script>
</body>
</html>
